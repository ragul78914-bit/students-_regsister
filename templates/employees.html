<!DOCTYPE html>
<html>
<head>
    <title>Employees List</title>
</head>
<body>

<h2>Employees</h2>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Age</th>
        <th>Job</th>
        <th>Email</th>
    </tr>

    {% for emp in employees %}
    <tr>
        <td>{{ emp[0] }}</td>
        <td>{{ emp[1] }}</td>
        <td>{{ emp[2] }}</td>
        <td>{{ emp[3] }}</td>
        <td>{{ emp[4] }}</td>
    </tr>
    {% endfor %}

</table>

</body>
</html>
