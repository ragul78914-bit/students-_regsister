<!DOCTYPE html>
<html>
<head>
    <title>Employee Register</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h2>Employee Registration</h2>

    <form action="/add" method="POST">
        NAME: <input type="text" name="name" placeholder="Name" required>
        AGE:<input type="number" name="age" placeholder="Age" required>
       JOB <input type="text" name="job" placeholder="Job" required>
        E-Mail:<input type="email" name="email" placeholder="Email" required>
        Password:<input type="password" name="password" placeholder="Password" required>

        <button type="submit">Register</button>
    </form>

    <a href="/employees">View Employees</a>
</div>

</body>
</html>
